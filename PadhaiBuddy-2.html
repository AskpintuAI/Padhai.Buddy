  <script>
    var firebaseConfig = {
      apiKey: "AIzaSyD1AvMlfMgm1N2Mr2R7d5_D71MP50No_oY",
      authDomain: "padhai-bfc59.firebaseapp.com",
      projectId: "padhai-bfc59",
      storageBucket: "padhai-bfc59.firebasestorage.app",
      messagingSenderId: "891477871352",
      appId: "1:891477871352:web:5968e2e6c3c93d3628890d"
    };

    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    auth.languageCode = 'hi';

    window.PB_AUTH = {
      confirmResult: null,

      sendOtp: function(phone, onSuccess, onError) {
        var fullPhone = "+91" + phone;
        // Fresh recaptcha div हर बार
        var oldDiv = document.getElementById('recaptcha-container');
        if(oldDiv) oldDiv.remove();
        var newDiv = document.createElement('div');
        newDiv.id = 'recaptcha-container';
        document.body.appendChild(newDiv);

        try {
          var verifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            size: 'invisible',
            callback: function() {}
          });
          auth.signInWithPhoneNumber(fullPhone, verifier)
            .then(function(result) {
              window.PB_AUTH.confirmResult = result;
              onSuccess();
            })
            .catch(function(err) {
              var msg = "";
              if(err.code === 'auth/invalid-phone-number') msg = "नंबर गलत है।";
              else if(err.code === 'auth/too-many-requests') msg = "बहुत बार try किया। थोड़ी देर बाद करें।";
              else if(err.code === 'auth/quota-exceeded') msg = "आज की OTP limit पूरी हो गई।";
              else if(err.code === 'auth/captcha-check-failed') msg = "reCAPTCHA fail। Page reload करें।";
              else msg = "OTP error: " + (err.message || err.code);
              onError(msg);
            });
        } catch(e) {
          onError("Error: " + e.message);
        }
      },

      verifyOtp: function(code, onSuccess, onError) {
        if(!window.PB_AUTH.confirmResult){ onError("पहले OTP भेजें।"); return; }
        window.PB_AUTH.confirmResult.confirm(code)
          .then(function(result) { onSuccess(result.user); })
          .catch(function() { onError("OTP गलत है। दोबारा डालें।"); });
      }
    };
  </script>

function pCol(p) { return p===100?C.g:p<=49?C.r:C.a; }

function QB() {
  var qi = useState(0);
  var idx = qi[0]; var setIdx = qi[1];
  useEffect(function(){
    var t = setInterval(function(){ setIdx(function(x){ return x===2?0:x+1; }); }, 5000);
    return function(){ clearInterval(t); };
  }, []);
  var q = QTS[idx];
  return (
    <div style={{margin:"8px 14px 4px",borderRadius:"12px",background:q.bg,padding:"10px 13px",border:"1px solid #00000010"}}>
      <div style={{display:"flex",gap:"10px",alignItems:"center"}}>

}

function SBar() {

            <div style={{marginBottom:"6px"}}>

                <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
                  <div style={{fontSize:"16px",fontWeight:"800",color:C.t,marginBottom:"12px"}}>सभी छात्र</div>
                  {students.map(function(s){ return <SCard key={s.id} s={s} onToggle={toggleHw} onUpdate={updateStudent} onDelete={deleteStudent}/>; })}
                </div>
              )}
              {tab==="settings" && (
                <SettingsScreen onLogout={function(){setShowOut(true);}} onDeleteAccount={function(){setScreen("deleteConfirm");}}/>
              )}
              <BNav active={tab} onNav={setTab} role="principal"/>
            </div>
          )}

          {screen==="app" && (role==="teacher"||role==="special") && loggedTeacher && (
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {tab==="home" && (
                <div style={{flex:1,overflowY:"auto"}}>
                  <div style={{background:"linear-gradient(135deg,#064E3B,#059669)",padding:"16px 18px 20px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div><div style={{color:"rgba(255,255,255,0.6)",fontSize:"11px"}}>NAMASTE</div><div style={{color:"white",fontSize:"18px",fontWeight:"800"}}>{loggedTeacher.name}</div><div style={{color:"rgba(255,255,255,0.55)",fontSize:"11px"}}>{loggedTeacher.subject}</div></div>
                      <button onClick={function(){ setShowOut(true); }} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:"10px",padding:"7px 11px",cursor:"pointer",color:"white",fontSize:"11px",fontWeight:"700"}}>लॉग आउट</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"9px",marginTop:"12px"}}>
                      {[{l:"छात्र",v:myStudents.length+"/30"},{l:"पूर्ण",v:myStudents.filter(function(s){ return hwpct(s.hw)===100; }).length},{l:"बाकी",v:myStudents.filter(function(s){ return hwpct(s.hw)!==100; }).length}].map(function(s, i){
                        return <div key={i} style={{background:"rgba(255,255,255,0.14)",borderRadius:"10px",padding:"9px",textAlign:"center"}}><div style={{color:"white",fontSize:"18px",fontWeight:"800"}}>{s.v}</div><div style={{color:"rgba(255,255,255,0.65)",fontSize:"9px"}}>{s.l}</div></div>;
                      })}
                    </div>
                  </div>
                  <QB/>
                  <div style={{padding:"4px 14px 14px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"9px",marginBottom:"12px"}}>
                      <button onClick={function(){ setTab("homework"); }} style={{padding:"13px",background:"linear-gradient(135deg,#FF6B00,#E55A00)",color:"white",border:"none",borderRadius:"11px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>HW दें</button>
                      <button onClick={function(){ setScreen("addStudent"); }} style={{padding:"13px",background:"linear-gradient(135deg,#16A34A,#15803D)",color:"white",border:"none",borderRadius:"11px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>छात्र जोड़ें</button>
                    </div>
                    {myStudents.length===0 && <div style={{textAlign:"center",padding:"20px",color:C.gr}}>कोई छात्र नहीं।</div>}
                    {myStudents.slice(0,5).map(function(s){ return <SCard key={s.id} s={s} onToggle={toggleHw} onUpdate={updateStudent} onDelete={deleteStudent}/>; })}
                  </div>
                </div>
              )}
              {tab==="homework" && (
                <HwListScreen
                  homeworks={homeworks}
                  teacher={loggedTeacher}
                  students={myStudents}
                  onNew={function(){setTab("hwform");}}
                  onDelete={function(id){setHomeworks(function(p){return p.filter(function(h){return h.id!==id;});});}}
                  onUpdate={function(id,desc){setHomeworks(function(p){return p.map(function(h){return h.id===id?{id:h.id,tid:h.tid,tName:h.tName,subj:h.subj,classes:h.classes,desc:desc,dt:h.dt,isSp:h.isSp,mediaUrl:h.mediaUrl||""}:h;});});}}
                />
              )}
              {tab==="hwform" && <HwFormScreen teacher={loggedTeacher} count={myStudents.length} onSave={function(h){ addHomework(h); setTab("homework"); }} onBack={function(){ setTab("homework"); }}/>}
              {tab==="students" && (
                <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                    <div style={{fontSize:"16px",fontWeight:"800",color:C.t}}>मेरे छात्र ({myStudents.length}/30)</div>
                    <button onClick={function(){ setScreen("addStudent"); }} style={{padding:"7px 12px",background:"linear-gradient(135deg,#16A34A,#15803D)",color:"white",border:"none",borderRadius:"9px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>+ जोड़ें</button>
                  </div>
                  {myStudents.map(function(s){ return <SCard key={s.id} s={s} onToggle={toggleHw} onUpdate={updateStudent} onDelete={deleteStudent}/>; })}
                </div>
              )}
              {tab==="notif" && (
                <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
                  <div style={{fontSize:"16px",fontWeight:"800",color:C.t,marginBottom:"12px"}}>सूचनाएं</div>
                  <QB/>
                  <div style={{background:"white",borderRadius:"12px",padding:"12px 13px",marginBottom:"9px",display:"flex",gap:"10px",borderLeft:"4px solid "+C.g}}><span style={{fontSize:"20px"}}>📝</span><div><div style={{fontWeight:"700",fontSize:"13px",color:C.t}}>HW जमा</div><div style={{fontSize:"11px",color:C.gr}}>प्रिया देवी ने HW जमा की</div></div></div>
                </div>
              )}
              <BNav active={tab} onNav={setTab} role="teacher"/>
            </div>
          )}

          {screen==="app" && role==="parent" && (
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
              {parentKids.length===0 ? (
                <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"30px"}}>
                  <div style={{fontSize:"50px",marginBottom:"14px"}}>👦</div>
                  <div style={{fontSize:"15px",fontWeight:"800",color:C.t,marginBottom:"6px"}}>कोई छात्र नहीं मिला</div>
                  <div style={{fontSize:"12px",color:C.gr}}>Teacher से नंबर add करवाएं।</div>
                </div>
              ) : (
                <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
                  <div style={{background:"linear-gradient(135deg,#7F1D1D,#DC2626)",padding:"16px 18px 20px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div><div style={{color:"rgba(255,255,255,0.6)",fontSize:"11px"}}>NAMASTE</div><div style={{color:"white",fontSize:"18px",fontWeight:"800"}}>{parentKids[0].pName||"अभिभावक जी"}</div><div style={{color:"rgba(255,255,255,0.55)",fontSize:"11px"}}>{parentKids[0].name} - {parentKids[0].cls}</div></div>
                      <button onClick={function(){ setShowOut(true); }} style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",borderRadius:"10px",padding:"7px 11px",cursor:"pointer",color:"white",fontSize:"11px",fontWeight:"700"}}>लॉग आउट</button>
                    </div>
                  </div>
                  {tab==="home" && (
                    <div style={{flex:1,overflowY:"auto"}}>
                      <QB/>
                      <div style={{padding:"4px 14px 14px"}}>
                        <div style={{fontWeight:"700",fontSize:"13px",color:C.t,marginBottom:"10px"}}>{parentKids[0].name} - आज की गृहकार्य</div>
                        {Object.keys(parentKids[0].hw).map(function(k){
                          var v = parentKids[0].hw[k];
                          return (
                            <div key={k} style={{background:"white",borderRadius:"13px",padding:"12px 14px",marginBottom:"9px",borderLeft:"4px solid "+(v==="done"?C.g:C.o),display:"flex",alignItems:"center",gap:"11px"}}>
                              <button onClick={function(){ toggleHw(parentKids[0].id, k); }} style={{width:"34px",height:"34px",border:"none",cursor:"pointer",borderRadius:"9px",background:v==="done"?C.gl:C.rl,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"17px",flexShrink:0}}>{v==="done"?"✅":"🚩"}</button>
                              <div style={{flex:1}}><div style={{fontWeight:"700",fontSize:"14px",color:C.t}}>{HWL[k]||k}</div><div style={{fontSize:"11px",color:C.gr}}>{v==="done"?"जमा हो गई":"अभी बाकी है"}</div></div>
                              <span style={{fontSize:"10px",fontWeight:"800",color:v==="done"?C.g:C.r,background:v==="done"?C.gl:C.rl,padding:"4px 9px",borderRadius:"18px"}}>{v==="done"?"पूर्ण":"बाकी"}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {tab==="homework" && (
                    <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
                      <div style={{fontSize:"16px",fontWeight:"800",color:C.t,marginBottom:"12px"}}>गृहकार्य</div>
                      <QB/>
                      {parentHws.length===0 && <div style={{textAlign:"center",padding:"40px 20px",color:C.gr}}><div style={{fontSize:"40px",marginBottom:"10px"}}>📚</div><div style={{fontSize:"14px",fontWeight:"700"}}>अभी कोई गृहकार्य नहीं</div></div>}
                      {parentHws.map(function(h, i){
                        return (
                          <div key={h.id||i} style={{background:"white",borderRadius:"13px",padding:"13px 14px",marginBottom:"10px",borderLeft:"4px solid "+C.o}}>
                            <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}><span style={{fontSize:"11px",fontWeight:"800",background:C.ol,color:C.od,padding:"2px 9px",borderRadius:"8px"}}>{h.subj}</span><span style={{fontSize:"10px",color:C.gr}}>{h.dt}</span></div>
                            <div style={{fontSize:"13px",fontWeight:"600",color:C.t,lineHeight:"1.6",marginBottom:"6px"}}>{h.desc}</div>
                            <div style={{fontSize:"10px",color:C.gr}}>{h.tName}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {tab==="notif" && (
                    <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
                      <div style={{fontSize:"16px",fontWeight:"800",color:C.t,marginBottom:"12px"}}>सूचनाएं</div>
                      <QB/>
                      <div style={{background:"white",borderRadius:"12px",padding:"12px 13px",borderLeft:"4px solid "+C.o,display:"flex",gap:"10px"}}><span style={{fontSize:"20px"}}>📝</span><div><div style={{fontWeight:"700",fontSize:"13px",color:C.t}}>नई HW</div><div style={{fontSize:"11px",color:C.gr}}>आज की गृहकार्य देखें</div></div></div>
                    </div>
                  )}
                  <BNav active={tab} onNav={setTab} role="parent"/>
                </div>
              )}
            </div>
          )}

        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PadhaiBuddy/>);
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js')
          .then(function(reg){ console.log('SW registered'); })
          .catch(function(err){ console.log('SW error:', err); });
      });
    }
  </script>
</body>
</html>
